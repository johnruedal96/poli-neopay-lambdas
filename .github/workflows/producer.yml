name: Deploy Producer Lambda

on:
  push:
    branches: [main]
    paths:
      - 'producer/**'
  workflow_dispatch:
    inputs:
      stage:
        description: 'Stage (dev, prod)'
        default: 'dev'
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.stage || 'dev' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build Lambda package
        run: |
          cd producer
          pip install -r requirements.txt -t ./package
          cp main.py package/
          cd package
          zip -r lambda.zip *

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update Lambda code
        run: |
          STAGE=${{ github.event.inputs.stage || 'dev' }}
          aws lambda update-function-code \
            --function-name neopay-pagos-producer-$STAGE \
            --zip-file fileb://producer/package/lambda.zip \
            --publish

      - name: Update Lambda environment variables
        run: |
          STAGE=${{ github.event.inputs.stage || 'dev' }}
          QUEUE_URL=$(aws sqs get-queue-url --queue-name neopay-pagos-$STAGE --query QueueUrl --output text)
          aws lambda update-function-configuration \
            --function-name neopay-pagos-producer-$STAGE \
            --environment "Variables={QUEUE_URL=$QUEUE_URL}"