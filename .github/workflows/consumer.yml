name: Deploy Consumer Lambda

on:
  push:
    branches: [main]
    # paths:
    #   - 'consumer/**'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'
  AWS_REGION: us-east-1
  STAGE: dev

jobs:
  lint-and-security:
    name: Lint & Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install -r consumer/requirements.txt
          pip install ruff bandit pip-audit

      - name: Ruff Lint
        run: ruff check consumer/

      - name: Ruff Format Check
        run: ruff format --check consumer/

      - name: Bandit Security Scan
        run: bandit -r consumer/ -f json -o bandit-report.json
        continue-on-error: true

      - name: pip-audit (Dependency Vulnerabilities)
        run: |
          pip-audit -r consumer/requirements.txt || true
        continue-on-error: true

      - name: Upload Bandit Report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: bandit-report-consumer
          path: bandit-report.json

  build:
    name: Build Lambda Package
    runs-on: ubuntu-latest
    needs: lint-and-security
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build Lambda package
        run: |
          cd consumer
          pip install -r requirements.txt -t ./package
          cp main.py package/
          cd package
          zip -r lambda.zip *
          echo "BUILD_HASH=$(sha256sum lambda.zip | cut -d' ' -f1)" >> $GITHUB_ENV
          echo "Lambda package built successfully"
          ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-consumer-package
          path: consumer/package/lambda.zip

  deploy:
    name: Deploy to Dev (Canary)
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    environment: dev
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-consumer-package
          path: consumer/package

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy Consumer Lambda (Canary - 10% traffic)
        run: |
          cd consumer/package
          
          echo "Cargando nuevo código..."
          aws lambda update-function-code \
            --function-name neopay-pagos-consumer-${{ env.STAGE }} \
            --zip-file fileb://lambda.zip

          echo "Esperando a que el código se procese..."
          aws lambda wait function-updated \
            --function-name neopay-pagos-consumer-${{ env.STAGE }}

          echo "Actualizando configuración de variables de entorno..."
          aws lambda update-function-configuration \
            --function-name neopay-pagos-consumer-${{ env.STAGE }} \
            --environment "Variables={DB_HOST=${{ secrets.DB_HOST }},DB_PORT=${{ secrets.DB_PORT }},DB_NAME=${{ secrets.DB_NAME }},DB_USER=${{ secrets.DB_USER }},DB_PASSWORD=${{ secrets.DB_PASSWORD }}}"

          echo "Esperando a que la configuración se procese..."
          aws lambda wait function-updated \
            --function-name neopay-pagos-consumer-${{ env.STAGE }}

          echo "Publicando nueva versión"
          NEW_VERSION=$(aws lambda publish-version \
            --function-name neopay-pagos-consumer-${{ env.STAGE }} \
            --query 'Version' \
            --output text)

          echo "Published version: $NEW_VERSION"
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

          echo "Configurando Alias Canary con 10% de tráfico"
          aws lambda put-alias \
            --function-name neopay-pagos-consumer-${{ env.STAGE }} \
            --name canary \
            --function-version $NEW_VERSION \
            --routing-config "{\"AdditionalVersionWeights\": {\"$NEW_VERSION\": 0.1}}"

          echo "✓ Canary alias configured successfully"
      - name: Wait and Monitor (Canary Period)
        run: |
          echo "Waiting 60 seconds for canary evaluation..."
          sleep 60

          LOG_GROUP="/aws/lambda/neopay-pagos-consumer-${{ env.STAGE }}"
          ERRORS=$(aws logs filter-log-events \
            --log-group-name "$LOG_GROUP" \
            --start-time $(date -d '5 minutes ago' +%s)000 \
            --filter-pattern '"ERROR"' \
            --query 'events | length(@)' \
            --output text 2>/dev/null || echo "0")

          echo "Errors in last 5 minutes: $ERRORS"

          if [ "$ERRORS" -gt "10" ]; then
            echo "✗ Too many errors detected: $ERRORS"
            exit 1
          else
            echo "✓ Error count acceptable: $ERRORS"
          fi

      - name: Promote Canary to Production
        if: success()
        run: |
          STAGE=${{ env.STAGE }}

          VERSION=$(aws lambda get-function \
            --function-name neopay-pagos-consumer-$STAGE \
            --query 'Configuration.Version' \
            --output text)

          aws lambda update-alias \
            --function-name neopay-pagos-consumer-$STAGE \
            --name canary \
            --function-version $VERSION \
            --routing-config '{}'

          echo "✓ Canary promoted to 100% production traffic"

      - name: Rollback on Failure
        if: failure()
        run: |
          STAGE=${{ env.STAGE }}
          echo "⚠ Deployment failed - rolling back to previous version"

          PREV_VERSION=$(aws lambda list-aliases \
            --function-name neopay-pagos-consumer-$STAGE \
            --query 'Aliases[?Name==`canary`].FunctionVersion' \
            --output text)

          if [ -n "$PREV_VERSION" ]; then
            aws lambda update-alias \
              --function-name neopay-pagos-consumer-$STAGE \
              --name canary \
              --function-version "$PREV_VERSION" \
              --routing-config '{}'
            echo "✓ Rollback completed to version $PREV_VERSION"
          fi

  notify:
    name: Notify Deployment Status
    runs-on: ubuntu-latest
    needs: deploy
    if: always()

    steps:
      - name: Send Slack Notification
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author,took
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}